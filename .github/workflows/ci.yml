# W10 — CI gates mirroring the per-wave Definition of Done: server (typecheck + vitest) and
# migration (lint + typecheck + vitest + build). Same checks run locally before every commit.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  server:
    name: server (typecheck + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run typecheck
      # globalSetup pushes the schema to an isolated sqlite test.db before the suite.
      - run: npm test

  migration:
    name: migration (lint + typecheck + tests + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: migration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: migration/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
