# W10.1 — deploy-smoke: the gate the sqlite-only CI lacked. Builds the container image from
# server/Dockerfile and boots the FULL compose stack (server + postgres:16), then asserts the
# deploy chain `db push → healthz → seed → login`. This is the only job that actually exercises
# the Docker artifact + the Postgres path + the migration `.js→.ts` seed surface, so it catches
# the class of footgun that slipped past static review and the sqlite tests (e.g. the missing
# `COPY migration/package.json` that crashed boot — found 2026-06-21). See BUILD.md §W10.
#
# Separate workflow (not a job in ci.yml) so the `paths:` filter scopes to deploy-relevant files
# only — a docs-only commit doesn't pay the ~3-4 min image build. ci.yml stays untouched.
name: deploy-smoke

# NOTE: paths list is duplicated on purpose — GitHub Actions does not reliably expand YAML
# anchors/aliases, so keep these two blocks in sync by hand.
on:
  push:
    branches: [main, master]
    paths:
      - 'server/**'
      - 'migration/**'
      - 'docker-compose.yml'
      - '.dockerignore'
      - '.github/workflows/deploy-smoke.yml'
  pull_request:
    paths:
      - 'server/**'
      - 'migration/**'
      - 'docker-compose.yml'
      - '.dockerignore'
      - '.github/workflows/deploy-smoke.yml'

jobs:
  deploy-smoke:
    name: docker build + postgres boot + healthz/seed/login
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-smoke-pw   # ephemeral CI DB, dropped via `down -v` every run (≠ 'changeme' → passes M2 guard)
      COOKIE_SECURE: "1"               # M2 fail-fast requires this in prod; login smoke uses the BODY token (not the cookie), so HTTP on the runner is fine
    steps:
      - uses: actions/checkout@v4

      # totpSecret-at-rest key (AES-256-GCM). Generated per-run; never persisted.
      - name: generate APP_ENCRYPTION_KEY
        run: echo "APP_ENCRYPTION_KEY=$(openssl rand -hex 32)" >> "$GITHUB_ENV"

      # M2 — Ed25519 export-seal signing key (base64 PKCS8 DER), required by the prod fail-fast guard. Per-run.
      - name: generate APP_SIGNING_KEY
        run: echo "APP_SIGNING_KEY=$(openssl genpkey -algorithm ed25519 -outform DER | base64 -w0)" >> "$GITHUB_ENV"

      # Builds server/Dockerfile (catches COPY/dep/ESM footguns) and starts db + server.
      # compose's start command runs `prisma migrate deploy` (M4 — versioned Postgres migrations)
      # against postgres:16, then `npm start`.
      - name: build image + up stack
        run: docker compose up --build -d

      # Server boot = wait for db healthy → db push → tsx start. Poll up to ~120s.
      - name: wait for healthz
        run: |
          for i in $(seq 1 40); do
            if curl -fsS localhost:5181/healthz; then echo; echo "healthz up after $((i*3))s"; exit 0; fi
            sleep 3
          done
          echo "healthz never came up within ~120s"; exit 1

      # The W11 regression surface: seedData.ts imports migration/src/data.js → data.ts and
      # data_import.js → data_import.ts. A green seed proves tsx resolves `.js→.ts` in-container
      # AND that the Postgres write path works. (Dev creds; DB is ephemeral.)
      # M5 fail-closed guard (seed.ts) refuses to run under NODE_ENV=production (inherited from the
      # `server` service) unless explicitly overridden — this IS a demo/ephemeral CI DB, so opt in.
      - name: seed (proves tsx .js→.ts + Postgres writes)
        run: docker compose run --rm -e ALLOW_DEMO_SEED=1 server npm run seed

      # Full chain: server reads seeded Postgres, verifies the scrypt hash, issues a session.
      - name: assert healthz db:up + login returns a token
        run: |
          curl -fsS localhost:5181/healthz | grep -q '"db":"up"'
          curl -fsS -X POST 'localhost:5181/auth.login?batch=1' \
            -H 'content-type: application/json' \
            -d '{"0":{"email":"hartono.w@whr-cpa.id","password":"Partner#2025!"}}' \
            | grep -q '"token"'

      # M2 (§3.2) — prove the guard REFUSES an insecure prod boot: same image, but COOKIE_SECURE=0
      # overridden → assertProdConfig must exit non-zero BEFORE listening. --no-deps: the guard runs
      # before any DB use, so no Postgres needed. If it boots anyway, that's a fail-fast regression.
      - name: fail-fast — boot refuses insecure prod config
        run: |
          if docker compose run --rm --no-deps -e COOKIE_SECURE=0 server npm start; then
            echo "REGRESSION: server booted despite COOKIE_SECURE=0 under NODE_ENV=production"; exit 1
          fi
          echo "OK: server refused to boot (fail-fast) with insecure config"

      # Fixed post pre-push-review finding: `npm run bootstrap` (the non-destructive real-firm
      # provisioning CLI) previously never ran through the M2 guard at all — it would silently
      # write a Partner-admin's TOTP secret unencrypted if APP_ENCRYPTION_KEY was missing/weak.
      # --no-deps: the guard must run before any DB use, so no Postgres needed. If bootstrap
      # proceeds anyway, that's a regression of the fix in server/src/bootstrap.ts.
      - name: fail-fast — bootstrap CLI refuses insecure prod config
        run: |
          if docker compose run --rm --no-deps -e APP_ENCRYPTION_KEY= server npm run bootstrap; then
            echo "REGRESSION: bootstrap proceeded despite missing APP_ENCRYPTION_KEY under NODE_ENV=production"; exit 1
          fi
          echo "OK: bootstrap refused to run (fail-fast) with insecure config"

      - name: dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: teardown (always — ephemeral CI DB)
        if: always()
        run: docker compose down -v

  # Deploy-Readiness live-test finding (2026-07-02): the job above only exercises server+db
  # directly on :5181 — it never goes through the real single-tenant edge (Caddy same-origin +
  # TLS), which is what an actual pilot instance serves. That gap let a real bug ship silently:
  # deploy/aws-ec2-test/Caddyfile forwarded /trpc/* to the server WITHOUT stripping the /trpc
  # prefix, but the server mounts tRPC at ROOT (same contract as the Vite dev proxy) — so every
  # tRPC call through the edge 404'd, including login. Found only by a real browser login through
  # a locally-run copy of deploy/aws-ec2-test/docker-compose.deploy.yml; fixed in the same commit.
  # This job makes that class of bug a CI failure instead of a live-testing discovery.
  edge-smoke:
    name: caddy edge (same-origin) + tRPC login through the real deploy package
    runs-on: ubuntu-latest
    env:
      COMPOSE: docker compose -f deploy/aws-ec2-test/docker-compose.deploy.yml --env-file deploy/aws-ec2-test/.env
    steps:
      - uses: actions/checkout@v4

      - name: generate .env (ephemeral CI keys)
        run: |
          cat > deploy/aws-ec2-test/.env <<EOF
          POSTGRES_PASSWORD=$(openssl rand -hex 24)
          APP_ENCRYPTION_KEY=$(openssl rand -hex 32)
          APP_SIGNING_KEY=$(openssl genpkey -algorithm ed25519 -outform DER | base64 -w0)
          BACKUP_ENCRYPTION_KEY=$(openssl rand -hex 32)
          PUBLIC_HOST=localhost
          COOKIE_SECURE=1
          ADMIN_IP_ALLOWLIST=
          LLM_API_KEY=
          LLM_PROVIDER=
          LLM_MODEL=
          EOF

      # Caddyfile defaults to `tls internal` (self-signed) — no DNS/ACME needed for CI.
      - name: build + boot (db + server + caddy edge)
        run: $COMPOSE up -d --build

      - name: wait for edge healthz (through Caddy, same-origin)
        run: |
          for i in $(seq 1 40); do
            if curl -fsSk https://localhost/healthz; then echo; echo "edge healthz up after $((i*3))s"; exit 0; fi
            sleep 3
          done
          echo "edge healthz never came up within ~120s"; exit 1

      - name: seed demo data
        run: $COMPOSE run --rm -e ALLOW_DEMO_SEED=1 server npm run seed

      # The actual regression: login THROUGH the edge at /trpc/auth.login (not :5181/auth.login).
      # This is the exact call that 404'd before the Caddyfile strip_prefix fix.
      - name: assert edge healthz db:up + login through /trpc prefix returns a token
        run: |
          curl -fsSk https://localhost/healthz | grep -q '"db":"up"'
          curl -fsSk -X POST 'https://localhost/trpc/auth.login?batch=1' \
            -H 'content-type: application/json' \
            -d '{"0":{"email":"hartono.w@whr-cpa.id","password":"Partner#2025!"}}' \
            | grep -q '"token"'

      - name: dump compose logs on failure
        if: failure()
        run: $COMPOSE logs --no-color

      - name: teardown (always — ephemeral CI DB)
        if: always()
        run: $COMPOSE down -v
