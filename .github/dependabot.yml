version: 2
updates:
  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development

  - package-ecosystem: npm
    directory: /migration
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development

  - package-ecosystem: docker
    directory: /server
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /deploy/aws-ec2-test
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
