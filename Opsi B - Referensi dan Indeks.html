<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opsi B Dikembangkan — Grup Referensi &amp; Indeks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="app/styles.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    body { background: var(--bg-sunken, #f1f4f7); color: var(--ink); font-family: 'Inter', system-ui, sans-serif; margin: 0; }
    .wrap { max-width: 1280px; margin: 0 auto; padding: 38px 32px 90px; }
    .kicker { font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--green, #1f8a5b); margin: 0 0 10px; }
    h1.top { font-size: 27px; font-weight: 800; letter-spacing: -.02em; margin: 0 0 12px; color: var(--navy); line-height: 1.18; max-width: 760px; }
    .lede { font-size: 14.5px; line-height: 1.62; color: var(--ink-2); margin: 0; max-width: 780px; }
    .lede b { color: var(--ink); }

    .layout { display: grid; grid-template-columns: 268px 1fr; gap: 44px; margin-top: 34px; align-items: start; }
    .rail { position: sticky; top: 24px; }
    .rail-cap { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--ink-3); margin: 0 0 10px; display: flex; align-items: center; gap: 7px; }
    .nav-card { border-radius: 13px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,40,60,.08), 0 10px 30px rgba(0,40,60,.10); border: 1px solid rgba(0,40,60,.12); }
    .nav-card .sidebar { width: 100%; flex: none; height: 612px; border-right: none; }
    .ws-mini { padding: 8px; border-bottom: 1px solid rgba(255,255,255,.07); display: flex; gap: 4px; }
    .ws-mini button { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 7px 6px; border-radius: 7px; border: none; font-size: 11px; font-weight: 700; cursor: default; }
    .ws-mini .on { background: var(--blue); color: #fff; }
    .ws-mini .off { background: transparent; color: var(--on-navy-dim); }

    .side-group.dev .side-group-h { color: #8fe0b8; }
    .side-group.dev { background: rgba(31,138,91,.10); border-radius: 8px; margin: 4px; padding-bottom: 4px; box-shadow: inset 0 0 0 1px rgba(77,200,140,.30); }
    .side-group.dev .side-item { margin-left: 4px; margin-right: 4px; }
    .side-item.spot .lbl { color: #eaffef; font-weight: 700; }
    .gap-tag { font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 9px; background: rgba(232,160,40,.22); color: #ffce7a; }
    .more-row { padding: 9px 18px 4px; font-size: 10.5px; color: var(--on-navy-dim); font-style: italic; }

    /* content */
    .content > section { background: #fff; border: 1px solid var(--line); border-radius: 13px; padding: 22px 24px; margin-bottom: 18px; }
    .sec-num { font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--green, #1f8a5b); }
    .sec-h { display: flex; align-items: baseline; gap: 10px; margin: 0 0 4px; }
    .sec-h h2 { font-size: 17px; font-weight: 700; color: var(--navy); margin: 0; }
    .sec-sub { font-size: 13px; color: var(--ink-3); line-height: 1.55; margin: 0 0 18px; }

    .seg2 { display: inline-flex; flex-wrap: wrap; gap: 6px; }
    .seg2 button { height: 33px; padding: 0 14px; border-radius: 8px; border: 1px solid var(--line-strong); background: #fff; font-size: 13px; font-weight: 600; color: var(--ink-2); cursor: pointer; transition: .12s; font-family: inherit; }
    .seg2 button:hover { border-color: var(--green, #1f8a5b); color: var(--green, #1f8a5b); }
    .seg2 button.on { background: var(--navy); border-color: var(--navy); color: #fff; }
    .name-why { margin-top: 16px; font-size: 13px; line-height: 1.6; color: var(--ink-2); background: var(--surface-2); border-radius: 10px; padding: 14px 16px; }
    .name-why b { color: var(--navy); }

    table.spec { width: 100%; border-collapse: collapse; }
    table.spec th { text-align: left; font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--ink-3); padding: 0 12px 9px; border-bottom: 1px solid var(--line); }
    table.spec td { padding: 13px 12px; border-bottom: 1px solid var(--line-soft); vertical-align: top; font-size: 13px; line-height: 1.5; color: var(--ink-2); }
    table.spec tr:last-child td { border-bottom: none; }
    .it-name { display: flex; align-items: center; gap: 9px; font-weight: 700; color: var(--navy); white-space: nowrap; }
    .it-ic { width: 26px; height: 26px; border-radius: 7px; background: var(--navy); color: #fff; display: grid; place-items: center; flex: 0 0 26px; }
    .pill { display: inline-block; font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 7px; }
    .pill.anchor { background: var(--blue-100); color: var(--blue); }
    .pill.add { background: var(--green-bg, #e3f3ea); color: var(--green, #1f8a5b); }
    .pill.opt { background: #f0ead8; color: #9a7b25; }

    .toggle-row { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--surface-2); border-radius: 10px; }
    .sw { width: 40px; height: 23px; border-radius: 12px; position: relative; cursor: pointer; flex: 0 0 40px; transition: .15s; }
    .sw .kn { position: absolute; top: 2px; width: 19px; height: 19px; border-radius: 50%; background: #fff; transition: .15s; box-shadow: 0 1px 3px rgba(0,0,0,.25); }
    .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 16px; }
    .stat-box { border: 1px solid var(--line); border-radius: 10px; padding: 13px 15px; }
    .stat-box .v { font-family: var(--mono); font-size: 23px; font-weight: 700; line-height: 1; }
    .stat-box .l { font-size: 11.5px; color: var(--ink-3); margin-top: 5px; font-weight: 600; }

    .ba { display: grid; grid-template-columns: 1fr auto 1fr; gap: 18px; align-items: center; }
    .ba-card { border: 1px solid var(--line); border-radius: 11px; overflow: hidden; }
    .ba-card .cap { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; padding: 9px 13px; border-bottom: 1px solid var(--line); }
    .ba-card.before .cap { background: #f1f3f5; color: #6a7882; }
    .ba-card.after .cap { background: var(--green-bg, #e3f3ea); color: var(--green, #1f8a5b); }
    .mini-side { background: var(--navy); padding: 8px 0; }
    .mini-h { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--on-navy-dim); padding: 6px 14px 4px; }
    .mini-i { display: flex; align-items: center; gap: 8px; padding: 5px 14px; font-size: 12px; color: var(--on-navy); }
    .mini-i .d { width: 5px; height: 5px; border-radius: 50%; background: var(--on-navy-dim); flex: 0 0 5px; }
    .ba-arrow { color: var(--green, #1f8a5b); display: grid; place-items: center; }

    .diff { font-family: var(--mono); font-size: 12.5px; line-height: 1.7; background: var(--navy); border-radius: 11px; padding: 16px 18px; overflow-x: auto; color: #cfdde6; }
    .diff .add { color: #7ee2a8; display: block; }
    .diff .del { color: #ff9b86; display: block; }
    .diff .ctx { color: #7e98a8; display: block; }
    .diff .cmt { color: #6b8294; display: block; font-style: italic; }

    .footnote { font-size: 12.5px; color: var(--ink-3); line-height: 1.6; margin-top: 6px; }
    @media (max-width: 980px) { .layout { grid-template-columns: 1fr; } .rail { position: static; } .nav-card .sidebar { height: auto; } .ba { grid-template-columns: 1fr; } .ba-arrow { transform: rotate(90deg); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="app/icons.jsx"></script>
  <script type="text/babel" src="app/view_compmatrix.jsx"></script>
  <script type="text/babel">
    const { useState } = React;

    function itemsOf(name) { const g = (window.MODULES || []).find(x => x.group === name); return g ? g.items : []; }
    const Ico = ({ name, size = 16 }) => { const C = (window.I && (window.I[name] || window.I.panel)); return C ? <C size={size} /> : null; };

    // ---- register stats (live from STANDARDS_REGISTRY) ----
    const REG = window.STANDARDS_REGISTRY || [];
    const nTotal = REG.length;
    const nGap = REG.filter(r => r.coverage === 'gap').length;
    const nChecklist = REG.filter(r => r.coverage === 'checklist').length;

    // ---- developed group contents ----
    const compmatrix = itemsOf('Indeks Standar')[0] || { id: 'compmatrix', label: 'Matriks Kepatuhan', icon: 'table', tag: 'NEW' };
    const [templates, kb] = itemsOf('Knowledge');
    const pustaka = { id: 'stdlib', label: 'Pustaka Standar', icon: 'book', sub: 'Telusur SA & PSAK' };

    const NAME_OPTIONS = ['Referensi & Indeks', 'Pustaka & Indeks', 'Indeks Standar', 'Standar & Pustaka'];

    function SidebarItem({ m, spot, gapBadge }) {
      return (
        <div className={'side-item' + (spot ? ' spot' : '')}>
          <span className="ico"><Ico name={m.icon} /></span>
          <span className="lbl">{m.label}</span>
          {gapBadge && nGap > 0 && <span className="gap-tag">{nGap} gap</span>}
          {!gapBadge && m.tag && <span className="tag">{m.tag}</span>}
        </div>
      );
    }

    function PlainGroup({ name }) {
      return (
        <div className="side-group">
          <div className="side-group-h"><span>{name}</span><Ico name="chevDown" size={13} /></div>
          {itemsOf(name).map(m => <SidebarItem key={m.id} m={m} />)}
        </div>
      );
    }

    function DevGroup({ groupName, withPustaka, gapBadge }) {
      const items = [compmatrix, ...(withPustaka ? [pustaka] : []), templates, kb].filter(Boolean);
      return (
        <div className="side-group dev">
          <div className="side-group-h"><span>{groupName}</span><Ico name="chevDown" size={13} /></div>
          {items.map(m => <SidebarItem key={m.id} m={m} spot={m.id === 'compmatrix'} gapBadge={gapBadge && m.id === 'compmatrix'} />)}
        </div>
      );
    }

    function LiveSidebar({ groupName, withPustaka, gapBadge }) {
      return (
        <div className="nav-card">
          <nav className="sidebar">
            <div className="ws-mini">
              <button className="on"><Ico name="briefcase" size={14} /> Perikatan</button>
              <button className="off"><Ico name="building" size={14} /> Firma</button>
            </div>
            <div className="side-scroll">
              <PlainGroup name="Engagement Workspace" />
              <DevGroup groupName={groupName} withPustaka={withPustaka} gapBadge={gapBadge} />
              <PlainGroup name="Core Planning" />
              <PlainGroup name="Core Execution" />
              <div className="more-row">… Core Specifics · Finalisasi &amp; Pelaporan</div>
            </div>
          </nav>
        </div>
      );
    }

    function App() {
      const [name, setName] = useState('Referensi & Indeks');
      const [withPustaka, setWithPustaka] = useState(true);
      const [gapBadge, setGapBadge] = useState(true);

      return (
        <div className="wrap">
          <p className="kicker">Opsi B · Dikembangkan</p>
          <h1 className="top">Grup “{name}” — rumah untuk lapisan rujukan Perikatan</h1>
          <p className="lede">Matriks Kepatuhan tetap di luar <i>Engagement Workspace</i>, tapi kini header grupnya punya alasan kuat: ia memimpin sebuah grup berisi <b>objek rujukan senasib</b> — register cakupan, pustaka standar, template, dan basis pengetahuan. Atur grupnya di kanan; sidebar Perikatan asli di kiri ikut berubah langsung.</p>

          <div className="layout">
            <div className="rail">
              <p className="rail-cap"><Ico name="briefcase" size={13} /> Pratinjau langsung</p>
              <LiveSidebar groupName={name} withPustaka={withPustaka} gapBadge={gapBadge} />
              <p className="footnote" style={{ marginTop: 12 }}>Grup berwarna hijau = grup yang dikembangkan. Item lain dirender dari registri modul aplikasi yang sebenarnya.</p>
            </div>

            <div className="content">
              {/* 1. NAMING */}
              <section>
                <div className="sec-h"><span className="sec-num">01</span><h2>Penamaan grup</h2></div>
                <p className="sec-sub">“Indeks Standar” terlalu sempit begitu grup berisi Template &amp; Knowledge Base. Pilih nama yang memayungi semua objek rujukan. Klik untuk menerapkannya ke pratinjau.</p>
                <div className="seg2">
                  {NAME_OPTIONS.map(o => (
                    <button key={o} className={name === o ? 'on' : ''} onClick={() => setName(o)}>{o}</button>
                  ))}
                </div>
                <div className="name-why">
                  Rekomendasi: <b>Referensi &amp; Indeks</b>. Kata “Referensi” memayungi Template &amp; Knowledge Base; “Indeks” menegaskan fungsi Matriks Kepatuhan sebagai peta cakupan. Keduanya membedakan lapisan ini dari <i>prosedur</i> (Core Planning/Execution) tanpa menyiratkan ini sekadar daftar standar.
                </div>
              </section>

              {/* 2. CONTENTS */}
              <section>
                <div className="sec-h"><span className="sec-num">02</span><h2>Isi grup</h2></div>
                <p className="sec-sub">Empat objek rujukan, diurutkan dari cakupan terluas (register lintas-standar) ke pustaka pendukung. Dua di antaranya selama ini tersembunyi dan hanya bisa diakses lewat ⌘K — kini terangkat.</p>
                <table className="spec">
                  <thead><tr><th>Item</th><th>Peran</th><th>Sumber</th><th>Status</th></tr></thead>
                  <tbody>
                    <tr>
                      <td><span className="it-name"><span className="it-ic"><Ico name="table" size={15} /></span>Matriks Kepatuhan</span></td>
                      <td>Register tunggal: tiap SA/PSAK/SPR/SJAH dipetakan ke checklist, modul, atau ditandai gap. Pintu masuk ke ~50+ halaman standar tersembunyi.</td>
                      <td>Sudah ada</td>
                      <td><span className="pill anchor">Jangkar</span></td>
                    </tr>
                    <tr>
                      <td><span className="it-name"><span className="it-ic"><Ico name="book" size={15} /></span>Pustaka Standar</span></td>
                      <td>Telusur langsung indeks SA &amp; PSAK (browse, bukan peta cakupan). Pelengkap Matriks untuk yang ingin membaca standar, bukan status.</td>
                      <td>Opsional · baru</td>
                      <td><span className="pill opt">Opsional</span></td>
                    </tr>
                    <tr>
                      <td><span className="it-name"><span className="it-ic"><Ico name="template" size={15} /></span>Template Library</span></td>
                      <td>Kertas kerja &amp; template surat siap pakai. Rujukan saat menyiapkan dokumentasi.</td>
                      <td>Diangkat dari grup tersembunyi</td>
                      <td><span className="pill add">Dipindah</span></td>
                    </tr>
                    <tr>
                      <td><span className="it-name"><span className="it-ic"><Ico name="book" size={15} /></span>Knowledge Base</span></td>
                      <td>Panduan, interpretasi, &amp; FAQ standar. Rujukan teks saat prosedur memerlukan dasar.</td>
                      <td>Diangkat dari grup tersembunyi</td>
                      <td><span className="pill add">Dipindah</span></td>
                    </tr>
                  </tbody>
                </table>
                <div className="toggle-row" style={{ marginTop: 16 }}>
                  <span className="sw" style={{ background: withPustaka ? 'var(--green, #1f8a5b)' : 'var(--line-strong)' }} onClick={() => setWithPustaka(v => !v)}><span className="kn" style={{ left: withPustaka ? 19 : 2 }}></span></span>
                  <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--ink)' }}>Sertakan “Pustaka Standar” (item opsional)</span>
                </div>
              </section>

              {/* 3. MATRIX DETAIL */}
              <section>
                <div className="sec-h"><span className="sec-num">03</span><h2>Lencana cakupan pada Matriks Kepatuhan</h2></div>
                <p className="sec-sub">Sebagai jangkar grup, Matriks Kepatuhan bisa membawa sinyal hidup: jumlah standar yang belum tercakup (gap), langsung di sidebar — agar backlog kepatuhan terlihat tanpa membuka halaman.</p>
                <div className="toggle-row">
                  <span className="sw" style={{ background: gapBadge ? 'var(--green, #1f8a5b)' : 'var(--line-strong)' }} onClick={() => setGapBadge(v => !v)}><span className="kn" style={{ left: gapBadge ? 19 : 2 }}></span></span>
                  <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--ink)' }}>Tampilkan lencana “{nGap} gap” (ganti tag NEW)</span>
                </div>
                <div className="stat-row">
                  <div className="stat-box"><div className="v" style={{ color: 'var(--navy)' }}>{nTotal}</div><div className="l">Standar terdaftar</div></div>
                  <div className="stat-box"><div className="v" style={{ color: 'var(--green, #1f8a5b)' }}>{nChecklist}</div><div className="l">Checklist kepatuhan</div></div>
                  <div className="stat-box"><div className="v" style={{ color: nGap ? '#c98a1e' : 'var(--green, #1f8a5b)' }}>{nGap}</div><div className="l">Belum tercakup (gap)</div></div>
                </div>
                <p className="footnote">Angka dibaca langsung dari <span className="mono">STANDARDS_REGISTRY</span> aplikasi — lencana akan selalu sinkron dengan kondisi register.</p>
              </section>

              {/* 4. BEFORE / AFTER */}
              <section>
                <div className="sec-h"><span className="sec-num">04</span><h2>Sebelum → Sesudah</h2></div>
                <p className="sec-sub">Grup satu-baris yang “bau desain” menjadi grup rujukan yang utuh dan bermakna.</p>
                <div className="ba">
                  <div className="ba-card before">
                    <div className="cap">Sebelum · header untuk 1 item</div>
                    <div className="mini-side">
                      <div className="mini-h">Indeks Standar</div>
                      <div className="mini-i"><span className="d"></span> Matriks Kepatuhan</div>
                    </div>
                  </div>
                  <div className="ba-arrow"><Ico name="arrowRight" size={22} /></div>
                  <div className="ba-card after">
                    <div className="cap">Sesudah · grup rujukan</div>
                    <div className="mini-side">
                      <div className="mini-h">{name}</div>
                      <div className="mini-i"><span className="d" style={{ background: '#4dc88c' }}></span> Matriks Kepatuhan</div>
                      {withPustaka && <div className="mini-i"><span className="d"></span> Pustaka Standar</div>}
                      <div className="mini-i"><span className="d"></span> Template Library</div>
                      <div className="mini-i"><span className="d"></span> Knowledge Base</div>
                    </div>
                  </div>
                </div>
              </section>

              {/* 5. IMPLEMENTATION */}
              <section>
                <div className="sec-h"><span className="sec-num">05</span><h2>Penerapan</h2></div>
                <p className="sec-sub">Perubahan terpusat di <span className="mono">app/icons.jsx</span> — tanpa menyentuh komponen Sidebar. Tiga sunting kecil:</p>
                <div className="diff">
                  <span className="cmt">// 1 — ganti nama grup &amp; isi dengan saudara rujukan</span>
                  <span className="del">- {'{'} group: 'Indeks Standar', items: [</span>
                  <span className="del">-     {'{'} id: 'compmatrix', label: 'Matriks Kepatuhan', icon: 'table', tag: 'NEW', deep: true {'}'} ] {'}'},</span>
                  <span className="add">+ {'{'} group: '{name}', items: [</span>
                  <span className="add">+     {'{'} id: 'compmatrix', label: 'Matriks Kepatuhan', icon: 'table', tag: '{gapBadge && nGap ? nGap + ' gap' : 'NEW'}', deep: true {'}'},</span>
                  {withPustaka && <span className="add">+     {'{'} id: 'stdlib', label: 'Pustaka Standar', icon: 'book', deep: true {'}'},</span>}
                  <span className="add">+     {'{'} id: 'templates', label: 'Template Library', icon: 'template', deep: true {'}'},</span>
                  <span className="add">+     {'{'} id: 'kb', label: 'Knowledge Base', icon: 'book', deep: true {'}'} ] {'}'},</span>
                  <span className="ctx">  </span>
                  <span className="cmt">// 2 — hapus grup 'Knowledge' (item-nya sudah pindah)</span>
                  <span className="cmt">// 3 — perbarui WORKSPACES.engagement.groups: 'Indeks Standar' → '{name}'</span>
                  <span className="ctx">  groups: ['Engagement Workspace', '{name}', 'Core Planning', …]</span>
                </div>
                <p className="footnote">Karena grup tetap berada di workspace Perikatan, <span className="mono">wsForModule</span> &amp; ⌘K terus bekerja. Template &amp; Knowledge Base keluar dari <span className="mono">HIDDEN_GROUPS</span> secara otomatis (grup “Knowledge” tak lagi ada).</p>
              </section>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
